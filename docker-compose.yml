services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clinic-net

  redis:
    image: redis:7-alpine
    container_name: clinic-redis
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clinic-net

  n8n:
    image: n8nio/n8n:latest
    container_name: clinic-n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - uploads:/opt/clinic-crm/uploads
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_SUBDOMAIN}.${DOMAIN}
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_SUBDOMAIN}.${DOMAIN}
      N8N_DEFAULT_CONCURRENCY: 8
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-clinic-main}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      DOMAIN: ${DOMAIN}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN}
      MOCK_SOCIAL: ${MOCK_SOCIAL:-true}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - clinic-net

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: clinic-evolution
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://n8n:5678/webhook/whatsapp-inbound
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      QRCODE_LIMIT: 6
      CONFIG_SESSION_PHONE_CLIENT: ClinicaCRM
      CONFIG_SESSION_PHONE_NAME: Chrome
      SERVER_URL: https://${EVOLUTION_SUBDOMAIN}.${DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q 'Evolution API' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - clinic-net

  streamlit:
    build: ./admin-ui
    container_name: clinic-admin
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    volumes:
      - ./admin-ui/src:/app
      - uploads:/opt/clinic-crm/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      N8N_WEBHOOK_BASE_URL: http://n8n:5678
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-clinic-main}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      CLINIC_WHATSAPP_NUMBER: ${CLINIC_WHATSAPP_NUMBER}
      DOMAIN: ${DOMAIN}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN}
      MOCK_SOCIAL: ${MOCK_SOCIAL:-true}
    restart: unless-stopped
    networks:
      - clinic-net

  caddy:
    image: caddy:2-alpine
    container_name: clinic-caddy
    depends_on:
      - n8n
      - evolution-api
      - streamlit
    env_file:
      - .env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - uploads:/srv/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - clinic-net

networks:
  clinic-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  evolution_data:
  caddy_data:
  caddy_config:
  uploads:
    driver: local
