# Production deployment on VPS with existing Traefik + n8n + Redis
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites on VPS:
#   - Traefik running (network_mode: host, Docker provider)
#   - n8n running at ${N8N_HOST}       → container: n8n-dlyc-n8n-1
#   - Redis running on host port 6379  → container: hg-redis
#   - Copy .env.example to .env and fill all values
#
# Services managed here: postgres, evolution-api, streamlit
# Services NOT managed here (already on VPS): traefik, n8n, redis (hg-redis)
#
# POST-STARTUP (run once after first `docker compose -f docker-compose.prod.yml up -d`):
#   docker network connect clinic-net n8n-dlyc-n8n-1
#
#   This lets n8n resolve the hostname "postgres" for workflow credentials.
#   Must be re-run if the n8n container is recreated from the Hostinger panel.
#
# PORTS 80/443:
#   Traefik runs network_mode:host so it routes directly to container bridge IPs.
#   evolution-api and streamlit expose nothing on the host — Traefik reads their
#   labels, gets their clinic-net IP, and proxies HTTPS traffic to them.

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clinic-net

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: clinic-evolution
    depends_on:
      postgres:
        condition: service_healthy
    # hg-redis is reachable via host gateway (publishes 0.0.0.0:6379 on the VPS)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - traefik.enable=true
      - traefik.http.routers.clinic-evolution.rule=Host(`${EVOLUTION_SUBDOMAIN}.${DOMAIN}`)
      - traefik.http.routers.clinic-evolution.entrypoints=websecure
      - traefik.http.routers.clinic-evolution.tls.certresolver=letsencrypt
      - traefik.http.services.clinic-evolution.loadbalancer.server.port=8080
    volumes:
      - evolution_data:/evolution/instances
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      # Uses internal postgres — evolution_api DB is created by init script
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution_api
      CACHE_REDIS_ENABLED: "true"
      # Uses existing hg-redis container via host gateway (port 6379 published on VPS host)
      CACHE_REDIS_URI: redis://host.docker.internal:6379
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_ENABLED: "true"
      # Points to the existing n8n instance on VPS via public HTTPS URL
      WEBHOOK_GLOBAL_URL: https://${N8N_HOST}/webhook/whatsapp-inbound
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      QRCODE_LIMIT: 6
      CONFIG_SESSION_PHONE_CLIENT: ClinicaCRM
      CONFIG_SESSION_PHONE_NAME: Chrome
      SERVER_URL: https://${EVOLUTION_SUBDOMAIN}.${DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q 'Evolution API' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - clinic-net

  streamlit:
    build: ./admin-ui
    container_name: clinic-admin
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.clinic-admin.rule=Host(`${ADMIN_SUBDOMAIN}.${DOMAIN}`)
      - traefik.http.routers.clinic-admin.entrypoints=websecure
      - traefik.http.routers.clinic-admin.tls.certresolver=letsencrypt
      - traefik.http.services.clinic-admin.loadbalancer.server.port=8501
      # Basic auth middleware — password hash generated with htpasswd
      - traefik.http.routers.clinic-admin.middlewares=clinic-admin-auth
      - traefik.http.middlewares.clinic-admin-auth.basicauth.users=${ADMIN_AUTH}
    volumes:
      - uploads:/opt/clinic-crm/uploads
    environment:
      TZ: America/Guatemala
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Points to the existing n8n instance on VPS via public HTTPS URL
      N8N_WEBHOOK_BASE_URL: https://${N8N_HOST}
      # Uses internal evolution-api service name
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-clinic-main}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      CLINIC_WHATSAPP_NUMBER: ${CLINIC_WHATSAPP_NUMBER}
      DOMAIN: ${DOMAIN}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN}
      MOCK_SOCIAL: ${MOCK_SOCIAL:-false}
    restart: unless-stopped
    networks:
      - clinic-net

networks:
  clinic-net:
    name: clinic-net
    driver: bridge

volumes:
  postgres_data:
  evolution_data:
  uploads:
    driver: local
